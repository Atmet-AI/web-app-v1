<h2>Sign in to Atmet</h2>
<p>Use this secure link to continue to your Atmet workspace.</p>
<p>
  <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=magiclink&redirect_to={{ .RedirectTo }}">
    Continue to Atmet
  </a>
</p>
<p>If you prefer using a code, enter this OTP:</p>
<p style="font-size: 24px; font-weight: 700; letter-spacing: 4px;">{{ .Token }}</p>
<p>This link and code expire soon. If you did not request this, you can ignore this email.</p>
